[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpc_interface_factory=supervisor.rpcinterface:make_main_rpc_interface

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
stdout_logfile=/var/log/nginx/access.log
stderr_logfile=/var/log/nginx/error.log
autorestart=true
priority=999
startsecs=0

[program:uvicorn]
command=/app/.venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000
directory=/app
stdout_logfile=/var/log/uvicorn/access.log
stderr_logfile=/var/log/uvicorn/error.log
autorestart=true
priority=1000
startsecs=5