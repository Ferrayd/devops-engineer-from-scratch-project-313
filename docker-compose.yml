version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: short_links
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/short_links
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 80 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  test:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/short_links_test
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: pytest
    profiles:
      - test

volumes:
  postgres_data: